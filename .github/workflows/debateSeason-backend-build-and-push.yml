name: Backend Build and Push

on:
  push:
    # main 브랜치에 push 될 때 워크플로우가 실행됩니다.
    branches: [ main ]
  pull_request:
    # main 브랜치에 pull request 될 때 워크플로우가 실행됩니다.
    branches: [ main ]

jobs:
  build-and-push:
    # 가장 최신의 Ubuntu 러너를 사용합니다.
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      # 현재 리포지토리를 체크아웃합니다.
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      # Docker Buildx를 설정합니다.
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        # GitHub Secret에서 Docker Hub 사용자 이름을 가져옵니다.
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        # GitHub Secret에서 Docker Hub 액세스 토큰을 가져옵니다.
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      uses: docker/build-push-action@v2
      with:
        # Dockerfile이 있는 위치입니다.
        context: .
        # Dockerfile의 경로입니다. 이미지 빌드
        file: ./Dockerfile
        # 이미지를 레지스트리에 푸시합니다.
        push: true
        # 이미지의 태그를 커밋의 id로 설정합니다.
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/debateSeason-backend:${{ github.sha }}
        platforms: linux/amd64,linux/arm64