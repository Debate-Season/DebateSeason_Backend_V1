name: PROD_CI/CD

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

env:
  GRADLE_OPTS: "-Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4"

# main 단일 브랜치 운영이다. develop 은 dev 서버 폐지 후 용도가 사라져 제거했다.
#   - PR(main 대상): build + test 만 실행 (deploy 잡에 push 가드가 있다)
#   - push(main):    build + test + deploy
#
# 연속 push 시 두 배포가 같은 app.jar / 백업 파일을 동시에 건드리는 것을 막는다.
# 배포 중인 작업은 끊지 않고(cancel-in-progress: false) 뒤에 줄을 세운다.
concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test --parallel

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: build/libs/*.jar
          retention-days: 7

  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'gradle'

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: build/libs

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --parallel --continue

      - name: Test Report
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: JUnit Tests
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: |
            build/reports/tests/test/
            build/test-results/test/
          retention-days: 7

  deploy:
    needs: [ build, test ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      # systemd 유닛 원본(deploy/toronchul.service)을 가져오기 위해 필요
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: build/libs

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer jar to Lightsail
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v plain | head -1)
          scp -i ~/.ssh/lightsail_key "$JAR_FILE" ubuntu@${{ secrets.LIGHTSAIL_HOST }}:/home/ubuntu/app/app.jar.new
          scp -i ~/.ssh/lightsail_key deploy/toronchul.service ubuntu@${{ secrets.LIGHTSAIL_HOST }}:/home/ubuntu/app/toronchul.service.new

      # 유닛 파일이 바뀐 경우에만 반영한다. 실제 재시작은 다음 스텝에서 한 번만 일어난다.
      - name: Sync systemd unit
        run: |
          ssh -T -i ~/.ssh/lightsail_key ubuntu@${{ secrets.LIGHTSAIL_HOST }} 'bash -s' << 'UNIT_SCRIPT'
          set -e
          NEW=/home/ubuntu/app/toronchul.service.new
          CUR=/etc/systemd/system/toronchul.service

          if cmp -s "$NEW" "$CUR"; then
            echo "systemd unit unchanged"
            rm -f "$NEW"
            exit 0
          fi

          echo "systemd unit changed — verifying before applying"

          # systemd-analyze verify는 파일명이 .service로 끝나야 동작한다.
          # 운영 유닛을 건드리기 전에 임시 경로에서 먼저 검증한다.
          CHECK_DIR=$(mktemp -d)
          cp "$NEW" "$CHECK_DIR/toronchul.service"
          if ! sudo systemd-analyze verify "$CHECK_DIR/toronchul.service"; then
            echo "unit verify failed — 운영 유닛을 건드리지 않고 중단한다"
            rm -rf "$CHECK_DIR"
            exit 1
          fi
          rm -rf "$CHECK_DIR"

          sudo cp "$CUR" "/home/ubuntu/app/toronchul.service.backup"
          sudo cp "$NEW" "$CUR"
          sudo systemctl daemon-reload
          rm -f "$NEW"
          echo "systemd unit applied"
          UNIT_SCRIPT

      - name: Deploy and health check
        run: |
          ssh -T -i ~/.ssh/lightsail_key ubuntu@${{ secrets.LIGHTSAIL_HOST }} 'bash -s' << 'DEPLOY_SCRIPT'
          APP_DIR=/home/ubuntu/app
          JAR=$APP_DIR/app.jar
          JAR_NEW=$APP_DIR/app.jar.new
          BACKUP_DIR=$APP_DIR/jar-backups
          KEEP=5

          # 이전 버전을 타임스탬프별로 보관한다.
          # 단일 app.jar.backup만 두면 두 버전 전으로는 되돌릴 수 없고,
          # 롤백이 그 하나를 소비해 버려 롤백 직후 백업이 없는 상태가 됐다.
          mkdir -p "$BACKUP_DIR"
          if [ -f "$JAR" ]; then
            cp "$JAR" "$BACKUP_DIR/app.jar.$(date -u '+%Y%m%d-%H%M%S')"
          fi

          # 최근 $KEEP개만 남기고 정리
          ls -1t "$BACKUP_DIR"/app.jar.* 2>/dev/null | tail -n "+$((KEEP + 1))" | xargs -r rm -f

          # Atomic swap
          mv "$JAR_NEW" "$JAR"

          # Kill any orphan java process occupying port 8080
          ORPHAN_PID=$(sudo lsof -ti :8080 || true)
          if [ -n "$ORPHAN_PID" ]; then
            echo "Killing orphan process on port 8080: PID=$ORPHAN_PID"
            sudo kill "$ORPHAN_PID" || true
            sleep 2
          fi

          # Restart service
          sudo systemctl restart toronchul

          # Health check: 12 attempts, 5 seconds apart (60s total)
          echo "Waiting for application to start..."
          DEPLOY_SUCCESS=false
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf http://localhost:8080/prod/actuator/health > /dev/null 2>&1; then
              echo "Health check passed (attempt $i)"
              DEPLOY_SUCCESS=true
              break
            fi
            echo "Health check attempt $i/12 failed, retrying..."
          done

          if [ "$DEPLOY_SUCCESS" = true ]; then
            echo "Deploy completed successfully"
            exit 0
          fi

          # Health check failed — rollback
          echo "Health check failed after 60 seconds. Rolling back..."
          LATEST_BACKUP=$(ls -1t "$BACKUP_DIR"/app.jar.* 2>/dev/null | head -1)

          if [ -z "$LATEST_BACKUP" ]; then
            echo "FATAL: 롤백할 백업이 없다. 수동 개입 필요."
            exit 1
          fi

          # cp로 되돌린다(mv 아님). 백업 세대를 보존해 재롤백이 가능하도록.
          echo "Rolling back to $LATEST_BACKUP"
          cp "$LATEST_BACKUP" "$JAR"
          sudo systemctl restart toronchul

          # 롤백이 실제로 살아났는지 반드시 확인한다.
          # 이전에는 재시작만 하고 검증 없이 종료해, 롤백 실패를 알 수 없었다.
          ROLLBACK_OK=false
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf http://localhost:8080/prod/actuator/health > /dev/null 2>&1; then
              ROLLBACK_OK=true
              break
            fi
          done

          if [ "$ROLLBACK_OK" = true ]; then
            echo "Rollback complete — service healthy on previous version."
          else
            echo "FATAL: 롤백 후에도 헬스체크 실패. 서비스가 내려가 있다. 수동 개입 필요."
          fi
          exit 1
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/lightsail_key
