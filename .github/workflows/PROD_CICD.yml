name: PROD_CI/CD

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

env:
  GRADLE_OPTS: "-Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test --parallel

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/libs/*.jar
          retention-days: 7

  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'gradle'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: build/libs

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --parallel --continue

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: JUnit Tests
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            build/reports/tests/test/
            build/test-results/test/
          retention-days: 7

  deploy:
    needs: [ build, test ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: build/libs

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer jar to Lightsail
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v plain | head -1)
          scp -i ~/.ssh/lightsail_key "$JAR_FILE" ubuntu@${{ secrets.LIGHTSAIL_HOST }}:/home/ubuntu/app/app.jar.new

      - name: Deploy and health check
        run: |
          ssh -T -i ~/.ssh/lightsail_key ubuntu@${{ secrets.LIGHTSAIL_HOST }} 'bash -s' << 'DEPLOY_SCRIPT'
          APP_DIR=/home/ubuntu/app
          JAR=$APP_DIR/app.jar
          JAR_NEW=$APP_DIR/app.jar.new
          JAR_BACKUP=$APP_DIR/app.jar.backup

          # Backup current jar
          if [ -f "$JAR" ]; then
            cp "$JAR" "$JAR_BACKUP"
          fi

          # Atomic swap
          mv "$JAR_NEW" "$JAR"

          # Kill any orphan java process occupying port 8080
          ORPHAN_PID=$(sudo lsof -ti :8080 || true)
          if [ -n "$ORPHAN_PID" ]; then
            echo "Killing orphan process on port 8080: PID=$ORPHAN_PID"
            sudo kill "$ORPHAN_PID" || true
            sleep 2
          fi

          # Restart service
          sudo systemctl restart toronchul

          # Health check: 12 attempts, 5 seconds apart (60s total)
          echo "Waiting for application to start..."
          DEPLOY_SUCCESS=false
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf http://localhost:8080/prod/actuator/health > /dev/null 2>&1; then
              echo "Health check passed (attempt $i)"
              DEPLOY_SUCCESS=true
              break
            fi
            echo "Health check attempt $i/12 failed, retrying..."
          done

          if [ "$DEPLOY_SUCCESS" = true ]; then
            echo "Deploy completed successfully"
            exit 0
          fi

          # Health check failed — rollback
          echo "Health check failed after 60 seconds. Rolling back..."
          if [ -f "$JAR_BACKUP" ]; then
            mv "$JAR_BACKUP" "$JAR"
            sudo systemctl restart toronchul
            echo "Rollback complete."
          fi
          exit 1
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/lightsail_key
